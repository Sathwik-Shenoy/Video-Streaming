<!doctype html>
<html lang="en" data-page="room">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Party - Room</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="overlay">
    <div class="spinner"></div>
    <p>Connecting to room…</p>
  </div>

  <!-- Waiting for Host Overlay -->
  <div id="waitingOverlay" class="overlay hidden">
    <div class="spinner"></div>
    <p>Waiting for host to start streaming…</p>
  </div>

  <main class="room-shell">
    <!-- Top Bar -->
    <header class="room-header">
      <div class="room-header-left">
        <a href="/" class="logo-link">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="logo-text">Watch Party</span>
        </a>
        <span class="separator">|</span>
        <span id="roomMeta" class="muted">Room</span>
      </div>
      <div class="room-header-right">
        <span id="connectionState" class="pill pill-warn">Connecting</span>
        <span id="viewerCount" class="pill">0 viewers</span>
        <button id="copyLinkBtn" class="btn btn-sm btn-ghost" title="Copy room link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Link
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="room-content">
      <!-- Video Section -->
      <div class="video-section">
        <div id="videoContainer" class="video-container">
          <video id="video" controls playsinline class="video-player"></video>
        </div>

        <!-- Controls Bar -->
        <div class="controls-bar">
          <div class="controls-left">
            <!-- Host-only controls -->
            <input type="file" id="filePicker" accept="video/*" class="file-input" />
            <button id="startStreamBtn" class="btn btn-primary btn-sm">Start Stream</button>
            <button id="shareScreenBtn" class="btn btn-sm btn-ghost">Share Screen</button>
          </div>
          <div class="controls-center">
            <button id="playBtn" class="btn btn-sm btn-ghost" title="Play">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button id="pauseBtn" class="btn btn-sm btn-ghost" title="Pause">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button id="syncBtn" class="btn btn-sm btn-ghost" title="Force sync">Sync</button>
            <button id="reconnectBtn" class="btn btn-sm btn-ghost" title="Reconnect">Reconnect</button>
          </div>
          <div class="controls-right">
            <span class="meta-label">
              <span class="muted small">Role:</span> <span id="roleLabel">-</span>
            </span>
            <span class="meta-label">
              <span class="muted small">Room:</span> <span id="roomLabel" title="">-</span>
            </span>
            <span class="meta-label">
              <span class="muted small">Latency:</span> <span id="latencyLabel">--</span>
            </span>
            <button id="toggleDebugBtn" class="btn btn-sm btn-ghost" title="Toggle debug overlay">Debug</button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar">
        <!-- Viewers Panel -->
        <div class="sidebar-panel viewers-panel">
          <h3 class="panel-title">Viewers</h3>
          <ul id="viewersList" class="viewers-list"></ul>
        </div>

        <!-- Chat Panel -->
        <div class="sidebar-panel chat-panel">
          <h3 class="panel-title">Chat</h3>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input id="chatInput" placeholder="Type a message…" />
            <button id="chatSendBtn" class="btn btn-sm btn-primary">Send</button>
          </div>
        </div>

        <!-- Connection Log (collapsible) -->
        <details class="sidebar-panel log-details">
          <summary class="panel-title">Connection Log</summary>
          <div id="logPanel" class="log-panel"></div>
        </details>
      </aside>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
